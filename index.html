<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>OSIRIS Review Room</title>
    <meta name="description" content="OSIRIS Review Room — A dual-lens social media content review engine for agencies and clients. Review, approve, and manage content in real-time." />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph (for sharing the client link) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OSIRIS Review Room" />
    <meta property="og:description" content="Review and approve your upcoming social media content with us." />
    <meta property="og:site_name" content="OSIRIS Review Room" />

    <!-- Preconnect for Google Fonts (used in index.css) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Prevent FOUC: inline critical font hint -->
    <style>
      body { font-family: "Inter", ui-sans-serif, system-ui, sans-serif; }
    </style>

    <!-- Favicon (inline SVG data-URI, no external asset required) -->

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
